<!DOCTYPE html>
<html>
<head>
<style>
html { background: #fff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  background: #FFFFFF;
  align-items: center;
  justify-content: center;
}
.center-block {
  text-align: center;
  padding: 20pt 40pt;
  position: relative;
  z-index: 1;
}
.center-block h1 { margin: 0 0 6pt 0; font-size: 28pt; color: #1A1A1A; font-weight: bold; line-height: 1.1; }
.center-block h2 { margin: 0 0 18pt 0; font-size: 13pt; color: #555555; font-weight: normal; }
.stat-row {
  display: flex;
  flex-direction: row;
  justify-content: center;
  gap: 20pt;
  margin: 0 0 18pt 0;
}
.stat-item { text-align: center; }
.stat-item h3 { margin: 0; font-size: 26pt; color: #DD1D21; font-weight: bold; }
.stat-item p { margin: 2pt 0 0 0; font-size: 8.5pt; color: #555555; }
.divider-line {
  width: 400pt;
  height: 2pt;
  background: #FBCE07;
  margin: 0 auto 16pt auto;
}
.tagline p { margin: 0; font-size: 11pt; color: #333333; font-style: italic; }
.bottom-note { margin: 14pt 0 0 0; }
.bottom-note p { margin: 0; font-size: 8pt; color: #AAAAAA; }
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6pt;
  background: #DD1D21;
}
.bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 6pt;
  background: #FBCE07;
}
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="center-block">
  <h1>Closing Title</h1>
  <h2>Subtitle</h2>
  </div>
  <div class="divider-line"></div>
  <div class="tagline"><p>"Inspirational quote or tagline"</p></div>
  <div class="bottom-note"><p>Confidential | Organization | Year</p></div>
</div>
<div class="bottom-bar"></div>
</body>
</html>
